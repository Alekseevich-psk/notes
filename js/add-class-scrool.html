<script>
    const btnTop = document.querySelector('.btn-top');
    console.log(btnTop);

    if(btnTop) {
        trackScroll(btnTop);
        window.onscroll = () => {trackScroll(btnTop)}
    }

    function trackScroll(el) {
        let scrolled = window.pageYOffset;
        let coords = 120;

        if (scrolled >= coords) {
            el.classList.add('show');
        }

        if (scrolled <= coords) {
            el.classList.remove('show');
        }
    }
</script>

<style>
    .btn-top {
        display: none;
        cursor: pointer;
        z-index: 100;
        position: fixed;
        bottom: 120px;
        right: 120px;
        width: 38px;
        height: 38px;

    &.show {
         display: block;
     }

    img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    }
</style>

<div class="btn-top">
